<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="DailyTechWire primary logo">
  <title>DailyTechWire — Primary logo (horizontal full color)</title>
  <desc>Coral monogram block with DTW initials, alongside the dailytechwire wordmark with a pulse signature beneath it. Coral accent dot at the second position of the pulse line.</desc>

  <!-- Monogram block -->
  <rect x="0" y="20" width="60" height="60" rx="8" fill="#E04E1F"/>
  <text x="30" y="59" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace"
        font-weight="600" font-size="22" letter-spacing="0.02em"
        fill="#FFFFFF">DTW</text>

  <!-- Wordmark -->
  <text x="76" y="51"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="26" letter-spacing="-0.02em"
        fill="#E04E1F">dailytechwire</text>

  <!-- Pulse signature (baseline under wordmark) -->
  <g transform="translate(76, 67)">
    <circle cx="2" cy="0" r="2.5" fill="#E04E1F"/>
    <line x1="7" y1="0" x2="26" y2="0" stroke="#E04E1F" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="31" cy="0" r="2.5" fill="#E04E1F"/>
    <line x1="36" y1="0" x2="55" y2="0" stroke="#E04E1F" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="60" cy="0" r="2.5" fill="#E04E1F"/>
    <line x1="65" y1="0" x2="84" y2="0" stroke="#E04E1F" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="89" cy="0" r="2.5" fill="#E04E1F"/>
    <line x1="94" y1="0" x2="113" y2="0" stroke="#E04E1F" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="118" cy="0" r="2.5" fill="#E04E1F"/>
    <line x1="123" y1="0" x2="142" y2="0" stroke="#E04E1F" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="147" cy="0" r="2.5" fill="#E04E1F"/>
  </g>
</svg>
