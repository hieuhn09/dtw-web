<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="DailyTechWire primary logo">
  <title>DailyTechWire — Primary logo (horizontal)</title>
  <desc>Navy DTW monogram block, the dailytechwire wordmark, and a pulse signature with a terracotta accent dot. Colours match the production brand tokens.</desc>

  <!-- Monogram block -->
  <rect x="0" y="20" width="60" height="60" rx="8" fill="#1B2A52"/>
  <text x="30" y="59" text-anchor="middle" font-family="'IBM Plex Mono','SF Mono',Menlo,monospace" font-weight="600" font-size="22" letter-spacing="0.02em" fill="#FFFFFF">DTW</text>

  <!-- Wordmark -->
  <text x="76" y="51" font-family="'IBM Plex Sans','Helvetica Neue',sans-serif" font-weight="700" font-size="26" letter-spacing="-0.02em" fill="#1B2A52">dailytechwire</text>

  <!-- Pulse signature (amber accent dot at position 2) -->
  <g transform="translate(76, 67)">
    <circle cx="2" cy="0" r="2.5" fill="#1B2A52"/>
    <line x1="7" y1="0" x2="26" y2="0" stroke="#1B2A52" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="31" cy="0" r="2.5" fill="#D4623C"/>
    <line x1="36" y1="0" x2="55" y2="0" stroke="#1B2A52" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="60" cy="0" r="2.5" fill="#1B2A52"/>
    <line x1="65" y1="0" x2="84" y2="0" stroke="#1B2A52" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="89" cy="0" r="2.5" fill="#1B2A52"/>
    <line x1="94" y1="0" x2="113" y2="0" stroke="#1B2A52" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="118" cy="0" r="2.5" fill="#1B2A52"/>
    <line x1="123" y1="0" x2="142" y2="0" stroke="#1B2A52" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="147" cy="0" r="2.5" fill="#1B2A52"/>
  </g>
</svg>
