<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="DailyTechWire primary logo">
  <title>DailyTechWire — Primary logo (horizontal full color)</title>
  <desc>Navy monogram block with DTW initials, alongside the navy dailytechwire wordmark with a pulse signature beneath it. Amber accent dot at the second position of the pulse line. Brand Guideline v1.0 §2.1.</desc>

  <!-- Monogram block — solid primary-900 navy, never gradient -->
  <rect x="0" y="20" width="60" height="60" rx="8" fill="#1E3A8A"/>
  <text x="30" y="59" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace"
        font-weight="600" font-size="22" letter-spacing="0.02em"
        fill="#FFFFFF">DTW</text>

  <!-- Wordmark — primary-900 navy -->
  <text x="76" y="51"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="26" letter-spacing="-0.02em"
        fill="#1E3A8A">dailytechwire</text>

  <!-- Pulse signature (baseline under wordmark) — 7 dots + 6 line segments
       alternating (guideline §6.2 mandatory anatomy), navy dots/lines,
       amber accent-500 dot fixed at position 2 -->
  <g transform="translate(76, 67)">
    <circle cx="2" cy="0" r="2.5" fill="#1E3A8A"/>
    <line x1="7" y1="0" x2="26" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="31" cy="0" r="2.5" fill="#F59E0B"/>
    <line x1="36" y1="0" x2="55" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="60" cy="0" r="2.5" fill="#1E3A8A"/>
    <line x1="65" y1="0" x2="84" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="89" cy="0" r="2.5" fill="#1E3A8A"/>
    <line x1="94" y1="0" x2="113" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="118" cy="0" r="2.5" fill="#1E3A8A"/>
    <line x1="123" y1="0" x2="142" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="147" cy="0" r="2.5" fill="#1E3A8A"/>
    <line x1="152" y1="0" x2="171" y2="0" stroke="#1E3A8A" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="176" cy="0" r="2.5" fill="#1E3A8A"/>
  </g>
</svg>
